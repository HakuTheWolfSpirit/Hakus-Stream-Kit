name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build
        run: dotnet build HakuStream.Kit.slnx -c Release
      - name: Verify formatting
        run: dotnet format HakuStream.Kit.slnx --verify-no-changes
